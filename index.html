<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2016 資本權力檔案 | The Capital & Power Atlas</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Serif+TC:wght@300;600;900&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --m-blue: #7c90a0;      /* 灰藍 */
            --m-rose: #a68e8e;      /* 灰紫紅 */
            --m-green: #909a8e;     /* 苔蘚綠 */
            --m-clay: #b5a494;      /* 陶土色 */
            --m-gold: #c2a679;      /* 莫蘭迪金 */
            --bg: #f2f0ed;          /* 亞麻灰白 */
            --glass-white: rgba(255, 255, 255, 0.85);
            --text-dark: #4a4a4a;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
            font-family: 'Noto Serif TC', serif;
            margin: 0; padding: 0;
            background-image: radial-gradient(#d1ccc0 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }

        /* 華麗動態標題 */
        .hero-section {
            padding: 80px 20px 40px;
            text-align: center;
            background: linear-gradient(to bottom, #e3dfd8, var(--bg));
        }

        .main-title {
            font-family: 'Cinzel', serif;
            font-size: 4.5rem;
            margin: 0;
            font-weight: 900;
            background: linear-gradient(45deg, var(--m-blue), var(--m-gold), var(--m-rose));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 15px;
            line-height: 1.2;
        }

        .sub-title-main {
            font-size: 1.8rem;
            letter-spacing: 8px;
            font-weight: 300;
            color: var(--m-clay);
            margin-top: 10px;
        }

        .manifesto {
            max-width: 800px;
            margin: 30px auto;
            font-weight: 300;
            line-height: 2;
            color: #777;
            border-left: 1px solid var(--m-gold);
            border-right: 1px solid var(--m-gold);
            padding: 0 20px;
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 40px; }

        /* 數據概況板 */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: var(--glass-white);
            padding: 25px;
            border-radius: 2px;
            border-bottom: 4px solid var(--m-clay);
            box-shadow: 0 10px 20px rgba(0,0,0,0.03);
            text-align: center;
        }

        .stat-card i { display: block; font-size: 0.8rem; text-transform: uppercase; color: var(--m-gold); margin-bottom: 10px; }
        .stat-card b { font-size: 2rem; font-family: 'Quicksand', sans-serif; display: block; }

        /* 權力者排行卡片 */
        .rank-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 60px;
        }

        .rank-card {
            background: var(--glass-white);
            padding: 40px 30px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.5);
            transition: 0.4s;
        }

        .rank-card::before {
            content: attr(data-rank);
            position: absolute;
            top: -20px; right: -10px;
            font-size: 8rem;
            font-family: 'Cinzel';
            color: rgba(181, 164, 148, 0.1);
            font-weight: 900;
        }

        .rank-card:hover { transform: translateY(-10px); background: #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }

        .rank-card .name { font-size: 2.2rem; font-weight: 900; margin: 0; color: var(--text-dark); }
        .rank-card .party-tag { display: inline-block; padding: 2px 10px; background: var(--m-blue); color: #fff; font-size: 0.8rem; margin-bottom: 15px; }
        .rank-card .data-row { display: flex; justify-content: space-between; margin-top: 15px; font-size: 0.9rem; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .rank-card .amount { color: var(--m-rose); font-weight: 700; font-family: 'Quicksand'; font-size: 1.2rem; }

        /* 搜尋與進階過濾 */
        .search-bar {
            background: #fff;
            padding: 10px;
            display: flex;
            align-items: center;
            border: 1px solid var(--m-clay);
            margin-bottom: 30px;
        }

        .search-bar input {
            flex: 1;
            border: none;
            padding: 15px 25px;
            font-size: 1.1rem;
            font-family: 'Noto Serif TC';
            outline: none;
        }

        /* 檔案清單表格 */
        .archive-table {
            width: 100%;
            background: var(--glass-white);
            border-collapse: collapse;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .archive-table th {
            background: var(--m-clay);
            color: #fff;
            text-align: left;
            padding: 20px;
            font-weight: 600;
            letter-spacing: 2px;
            font-size: 0.85rem;
        }

        .archive-table td { padding: 20px; border-bottom: 1px solid #eee; }
        .archive-table tr:hover { background: rgba(255,255,255,0.9); }

        .progress-bar { height: 4px; background: #eee; width: 100px; margin-top: 5px; position: relative; }
        .progress-fill { height: 100%; background: var(--m-blue); position: absolute; }

        @media (max-width: 900px) {
            .dashboard, .rank-section { grid-template-columns: 1fr; }
            .main-title { font-size: 2.5rem; letter-spacing: 5px; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <h1 class="main-title">THE CAPITAL ATLAS</h1>
        <div class="sub-title-main">2016 資本權力檔案</div>
        <p class="manifesto">
            「金錢是通往權力的路徑，而數字則是權力的腳印。」<br>
            本檔案詳實解構第九屆立法委員選舉資金版圖，透過 261 位權力玩家的收支流向，<br>
            我們得以窺見影響國家決策的經濟命脈。
        </p>
    </section>

    <div class="container">
        <div class="dashboard" id="dashboard">
            <div class="stat-card"><i>Archive Entities</i><b id="count_entities">0</b></div>
            <div class="stat-card"><i>Avg. Income</i><b id="avg_income">$0</b></div>
            <div class="stat-card"><i>Max Corporate Backing</i><b id="max_corp">0</b></div>
            <div class="stat-card"><i>Total Circulation</i><b id="total_circ">$0</b></div>
        </div>

        <h2 style="font-family: 'Cinzel'; border-bottom: 2px solid var(--m-gold); display: inline-block; padding-bottom: 10px; margin-bottom: 40px;">Top Tiers / 巔峰席位</h2>
        <div class="rank-section" id="rankSection"></div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="探尋特定姓名、政黨或選區之權力檔案..." onkeyup="filterData()">
        </div>

        <table class="archive-table">
            <thead>
                <tr>
                    <th>姓名檔案</th>
                    <th>選區 / 黨籍</th>
                    <th>得票資訊</th>
                    <th>企業支撐</th>
                    <th>收入總額 (TWD)</th>
                    <th>支出總額 (TWD)</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

<script>
    let masterData = [];

    async function fetchData() {
        try {
            const response = await fetch('2016.csv');
            const csv = await response.text();
            Papa.parse(csv, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    masterData = results.data.map(row => ({
                        name: row["姓名"],
                        area: row["地區"],
                        party: row["推薦政黨"],
                        votes: row["得票率"],
                        corp: parseInt(row["捐贈企業數"]) || 0,
                        income: parseInt((row["總收入"] || "0").replace(/,/g, '')) || 0,
                        expense: parseInt((row["總支出"] || "0").replace(/,/g, '')) || 0
                    })).sort((a, b) => b.income - a.income);
                    renderUI(masterData);
                }
            });
        } catch (e) { console.error("Archive failure", e); }
    }

    function renderUI(data) {
        updateDashboard(data);
        renderRanks(data.slice(0, 3));
        renderTable(data);
    }

    function updateDashboard(data) {
        const totalIncome = data.reduce((sum, d) => sum + d.income, 0);
        const maxCorp = Math.max(...data.map(d => d.corp));
        
        document.getElementById('count_entities').innerText = data.length;
        document.getElementById('avg_income').innerText = '$' + Math.round(totalIncome/data.length).toLocaleString();
        document.getElementById('max_corp').innerText = maxCorp;
        document.getElementById('total_circ').innerText = '$' + (totalIncome / 100000000).toFixed(2) + ' B';
    }

    function renderRanks(topData) {
        const container = document.getElementById('rankSection');
        const ranks = ["I", "II", "III"];
        container.innerHTML = topData.map((d, i) => `
            <div class="rank-card" data-rank="${ranks[i]}">
                <span class="party-tag">${d.party}</span>
                <p class="name">${d.name}</p>
                <p style="color: var(--m-clay); font-size: 0.9rem;">${d.area}</p>
                <div class="data-row"><span>總收入</span><span class="amount">$${d.income.toLocaleString()}</span></div>
                <div class="data-row"><span>企業捐贈數</span><span>${d.corp} 間</span></div>
                <div class="data-row"><span>得票率</span><span>${d.votes}</span></div>
            </div>
        `).join('');
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        const maxIncome = Math.max(...masterData.map(d => d.income));
        
        tbody.innerHTML = data.map(d => {
            const width = (d.income / maxIncome * 100) + "%";
            return `
            <tr>
                <td style="font-weight:600; font-size: 1.1rem;">${d.name}</td>
                <td>
                    <div style="font-size:0.8rem; color:var(--m-clay);">${d.area}</div>
                    <div style="font-size:0.9rem;">${d.party}</div>
                </td>
                <td><b style="font-family:Quicksand;">${d.votes}</b></td>
                <td><span style="color:var(--m-gold);">${d.corp}</span> <small>Corps</small></td>
                <td>
                    <div class="amount" style="font-weight:600;">$${d.income.toLocaleString()}</div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${width}"></div></div>
                </td>
                <td style="color:#999;">$${d.expense.toLocaleString()}</td>
            </tr>
        `}).join('');
    }

    function filterData() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = masterData.filter(d => 
            d.name.toLowerCase().includes(term) ||
            d.party.toLowerCase().includes(term) ||
            d.area.toLowerCase().includes(term)
        );
        renderTable(filtered);
    }

    window.onload = fetchData;
</script>

</body>
</html>
