            padding: 0;
            overflow-x: hidden;
            line-height: 1.6;

        .page-border {
            position: fixed;
            top: 20px; left: 20px; right: 20px; bottom: 20px;
            border: 1px solid var(--accent-gold);
            pointer-events: none;
            z-index: 1000;
        }
        .corner {
            position: fixed;
            width: 80px; height: 80px;
            border: 4px solid var(--accent-gold);
            z-index: 1001;
            pointer-events: none;
        }
        .top-left { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .top-right { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .bottom-right { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        .container {
            max-width: 1200px;
            margin: 80px auto;
            padding: 0 40px;
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 80px;
            animation: fadeInDown 1.5s ease-out;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            margin: 0;
            letter-spacing: 12px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            font-weight: 900;
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.5rem;
            color: var(--accent-gold);
            margin-top: 15px;
            letter-spacing: 4px;
            opacity: 0.9;
        }

            max-width: 700px;

            color: rgba(244, 234, 213, 0.7);
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding-top: 20px;
        }

        /* 英雄榜（Top 3） */
        .top-tier-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 80px;
        }

        .tier-card {
            background: var(--glass);
            border: 1px solid var(--accent-gold);
            padding: 30px;
            text-align: center;
            position: relative;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .tier-card:hover {
            transform: translateY(-15px);
            background: var(--emerald);
        }

        .tier-rank {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            color: var(--accent-gold);
            margin-bottom: 10px;
            display: block;
        }

        .tier-name {
            font-size: 2rem;
            font-weight: 900;
            margin: 10px 0;
            color: #fff;
        }

        .tier-amount {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--accent-gold);
            font-weight: bold;
        }

        /* 搜尋與過濾 */
        .control-panel {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 2px;
            margin-bottom: 40px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-box input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--accent-gold);
            padding: 10px 15px;
            color: var(--cream);
            font-size: 1.2rem;
            width: 350px;
            outline: none;
            font-family: 'Noto Serif TC', serif;

            display: flex;
            gap: 40px;
        }

        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--accent-gold); }
        .stat-value { font-size: 1.8rem; font-family: 'Cinzel', serif; font-weight: 700; }

        /* 表格優化 */
        .archive-wrapper {
            background: var(--glass);
            padding: 2px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: rgba(0,0,0,0.5);
            color: var(--accent-gold);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            padding: 25px 20px;
            text-align: left;
            border-bottom: 2px solid var(--accent-gold);
        }

        }

            font-size: 0.75rem;

        }

        .money-cell {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: var(--accent-gold);
        }

            from { opacity: 0; transform: translateY(-30px); }

            .control-panel { flex-direction: column; gap: 20px; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>

    function init() {
        renderTopTier();
        renderTable(rawData);
        updateStats(rawData);
    }

    // 渲染前三名「巔峰資本」
    function renderTopTier() {
        const sorted = [...rawData].sort((a, b) => b.income - a.income).slice(0, 3);
        const container = document.getElementById('topTier');
        const titles = ["Gold Tier / 首位", "Silver Tier / 次位", "Bronze Tier / 末席"];
        
        container.innerHTML = sorted.map((item, index) => `
            <div class="tier-card">
                <span class="tier-rank">${titles[index]}</span>
                <div class="tier-name">${item.name}</div>
                <div class="party-badge">${item.party}</div>
                <div class="tier-amount">$${item.income.toLocaleString()}</div>
            </div>
        `).join('');
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = data.map(item => `
            <tr>
                <td style="font-weight:700; font-size:1.1rem;">${item.name}</td>
                <td><span class="party-badge">${item.party}</span></td>
                <td style="color: rgba(244,234,213,0.6);">${item.area}</td>
                <td class="money-cell">$${item.income.toLocaleString()}</td>
                <td class="money-cell" style="opacity:0.7;">$${item.expense.toLocaleString()}</td>
            </tr>
        `).join('');
    }

    function updateStats(data) {
        document.getElementById('totalCount').innerText = data.length;
        const max = data.length > 0 ? Math.max(...data.map(d => d.income)) : 0;
        document.getElementById('maxIncome').innerText = '$' + max.toLocaleString();
    }

    function filterData() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const filtered = rawData.filter(item => 
            item.name.toLowerCase().includes(term) || 
            item.party.toLowerCase().includes(term) ||
            item.area.toLowerCase().includes(term)
        );
        renderTable(filtered);
        updateStats(filtered);
    }

    window.onload = init;
</script>
